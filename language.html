<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="shared.css">
  <!-- Preload next-page assets -->
  <link rel="preload" href="portal.html" as="document">
  <link rel="preload" href="./assets/IZS_Logo_Black.png" as="image">
  <script>
    if (sessionStorage.getItem('fromPage')) {
      document.documentElement.classList.add('page-entering');
    }
  </script>
  <style>
    /* Green overlay only needed for exit to screensaver */
    .green-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #1a5d48, #2d8a6c, #164e3c, #1a5d48);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .green-overlay.active {
      opacity: 1;
    }
    
    /* White overlay for page-to-page transitions */
    html.page-entering .white-overlay {
      opacity: 1 !important;
      transition: none !important;
    }
    .white-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 99;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .white-overlay.active {
      opacity: 1;
    }
    .white-overlay.entry {
      opacity: 1;
      transition: none;
    }
    .white-overlay.entry.reveal {
      opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Content animation */
    .content-wrapper {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .content-wrapper.hidden {
      opacity: 0;
      transform: translateY(10px) scale(0.99);
      transition: opacity 0.25s ease-out, transform 0.25s ease-out;
    }
    /* Exit to screensaver - content dissolve */
    .content-wrapper.exiting h1,
    .content-wrapper.exiting img,
    .content-wrapper.exiting .lang-card {
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      opacity: 0;
      transform: scale(0.97) translateY(-6px);
    }
    .content-wrapper.exiting .lang-card:last-of-type { transition-delay: 0s; }
    .content-wrapper.exiting .lang-card:first-of-type { transition-delay: 0.05s; }
    .content-wrapper.exiting img { transition-delay: 0.1s; }
    .content-wrapper.exiting h1 { transition-delay: 0.15s; }
  </style>
</head>
<body>
  <div class="green-overlay" id="greenOverlay"></div>
  <div class="white-overlay" id="whiteOverlay"></div>
  <div class="container content-wrapper" id="content" style="justify-content: center; align-items: center;">
    <div class="container" style="justify-content: center; align-items: center; padding-top: 1vmin;">
      <h1 style="font-size: clamp(32px, 3.4vmin, 65px); margin-bottom: clamp(27px, 2.8vmin, 54px); color: var(--primary); text-align: center;">
        Assalamu alaykum<br>السلام عليكم
      </h1>

    <img src="./assets/IZS_Logo_Black.png" alt="Logo" style="width: clamp(200px, 21vmin, 405px); margin-bottom: clamp(27px, 2.8vmin, 54px);">
    
    <div style="display: flex; gap: clamp(20px, 2.8vmin, 54px); justify-content: center; flex-wrap: nowrap;">
      <a href="portal.html?lang=de" class="lang-card" onclick="navigateTo(event, this.href)">
        <div style="font-size: clamp(48px, 7vmin, 135px); margin-bottom: clamp(10px, 1.4vmin, 27px);">DE</div>
        <h2 style="font-size: clamp(20px, 2.8vmin, 54px); margin: 0;">Deutsch</h2>
        <p style="color: var(--text-muted); font-size: clamp(14px, 1.6vmin, 30px);">Weiter auf Deutsch</p>
      </a>

      <a href="portal.html?lang=ar" class="lang-card" onclick="navigateTo(event, this.href)">
        <div style="font-size: clamp(48px, 7vmin, 135px); margin-bottom: clamp(10px, 1.4vmin, 27px);">AR</div>
        <h2 style="font-size: clamp(20px, 2.8vmin, 54px); margin: 0;" dir="rtl">العربية</h2>
        <p style="color: var(--text-muted); font-size: clamp(14px, 1.6vmin, 30px);" dir="rtl">الاستمرار باللغة العربية</p>
      </a>
    </div>
  </div>

  <script>
    const greenOverlay = document.getElementById('greenOverlay');
    const whiteOverlay = document.getElementById('whiteOverlay');
    const content = document.getElementById('content');
    
    if (sessionStorage.getItem('fromPage')) {
      document.documentElement.classList.remove('page-entering');
      whiteOverlay.classList.add('entry');
      sessionStorage.removeItem('fromPage');
      
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          whiteOverlay.classList.add('reveal');
        });
      });
    }

    // Smooth page navigation to portal (use white overlay)
    function navigateTo(event, url) {
      event.preventDefault();
      sessionStorage.setItem('fromPage', 'true');
      
      whiteOverlay.classList.remove('entry', 'reveal');
      whiteOverlay.classList.add('active');
      
      setTimeout(() => {
        window.location.href = url;
      }, 300);
    }
    
    // Fade to green for screensaver (idle timeout)
    function fadeToGreen() {
      sessionStorage.setItem('fromTimeout', 'true');
      
      // Start content exit animation first
      content.classList.add('exiting');
      
      // Then fade in green overlay
      setTimeout(() => {
        greenOverlay.classList.remove('entry', 'reveal');
        greenOverlay.classList.add('active');
      }, 100);
      
      // Navigate when fully covered
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 400);
    }

    let idle;
    const resetTimer = () => { 
      clearTimeout(idle); 
      idle = setTimeout(() => {
        fadeToGreen();
      }, 60000); 
    };
    window.onclick = resetTimer;
    resetTimer();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
