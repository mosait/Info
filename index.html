<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="shared.css">
  <!-- Preload next-page assets so they're ready before navigation -->
  <link rel="preload" href="language.html" as="document">
  <link rel="preload" href="./assets/IZS_Logo_Black.png" as="image">
  <style>
    .white-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .white-overlay.active {
      opacity: 1;
    }
    
    /* Entry animation when coming from timeout - elegant reveal */
    .screensaver-bg.entering .logo-main,
    .screensaver-bg.entering .title-main,
    .screensaver-bg.entering .title-sub,
    .screensaver-bg.entering .touch-area {
      opacity: 0;
      transform: translateY(20px) scale(0.97);
    }
    .screensaver-bg.entering .logo-main,
    .screensaver-bg.entering .title-main,
    .screensaver-bg.entering .title-sub {
      animation: none;
    }
    .screensaver-bg.entering.animate .logo-main,
    .screensaver-bg.entering.animate .title-main,
    .screensaver-bg.entering.animate .title-sub,
    .screensaver-bg.entering.animate .touch-area {
      transition: opacity 0.35s ease-out, 
                  transform 0.35s ease-out;
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .screensaver-bg.entering.animate .logo-main { transition-delay: 0s; }
    .screensaver-bg.entering.animate .title-main { transition-delay: 0.06s; }
    .screensaver-bg.entering.animate .title-sub { transition-delay: 0.12s; }
    .screensaver-bg.entering.animate .touch-area { transition-delay: 0.18s; }
    
    .logo-main {
      width: clamp(120px, 28vmin, 520px);
      margin-bottom: clamp(4px, 1vmin, 20px);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    .title-main {
      font-size: clamp(40px, 13vmin, 220px);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      margin: 0;
      line-height: 1.1;
    }
    .title-sub {
      font-size: clamp(22px, 6.5vmin, 110px);
      font-weight: 600;
      opacity: 0.85;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      margin-top: clamp(4px, 1.5vmin, 24px);
    }
    .touch-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: clamp(30px, 15vmin, 240px);
    }
    .touch-icon-wrapper {
      position: relative;
      width: clamp(60px, 15vmin, 240px);
      height: clamp(60px, 15vmin, 240px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pulse-ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      opacity: 0;
      animation: ripple 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    @keyframes ripple {
      0% { transform: scale(0.6); opacity: 0; }
      15% { opacity: 0.45; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .touch-icon svg {
      width: clamp(32px, 8vmin, 120px);
      height: clamp(32px, 8vmin, 120px);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
      animation: tapBounce 2s ease-in-out infinite;
    }
    @keyframes tapBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    .touch-label {
      position: absolute;
      bottom: clamp(16px, 4vmin, 70px);
      left: 0;
      right: 0;
      font-size: clamp(14px, 2.2vmin, 38px);
      font-weight: 300;
      opacity: 0.7;
      line-height: 1.6;
      text-align: center;
    }
    @media (prefers-reduced-motion: reduce) {
      .pulse-ring, .touch-icon svg { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="white-overlay" id="whiteOverlay"></div>
  <a href="language.html" class="screensaver-bg" id="screensaver" onclick="navigateAway(event)" style="padding-bottom: clamp(40px, 12vmin, 200px);">
    <img src="./assets/IZS_Logo_White.png" alt="Logo" class="logo-main">
    <div class="title-main">Infopoint</div>
    <div class="title-sub" dir="rtl">نقطة معلومات</div>
    <div class="touch-area">
      <div class="touch-icon-wrapper">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="touch-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
        </div>
      </div>
    </div>
    <div class="touch-label">Berühre um zu starten<br><span dir="rtl">اضغط للبدء</span></div>
  </a>

  <script>
    const screensaver = document.getElementById('screensaver');
    
    // Check if coming from timeout (white pages faded to green)
    if (sessionStorage.getItem('fromTimeout')) {
      screensaver.classList.add('entering');
      sessionStorage.removeItem('fromTimeout');
      // Trigger animation after a tiny delay
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          screensaver.classList.add('animate');
          // Remove entering class after animation completes so pulse rings resume
          setTimeout(() => {
            screensaver.classList.remove('entering', 'animate');
          }, 700);
        });
      });
    }

    function navigateAway(event) {
      event.preventDefault();
      const whiteOverlay = document.getElementById('whiteOverlay');
      
      sessionStorage.setItem('fromPage', 'true');
      
      whiteOverlay.classList.add('active');
      
      setTimeout(() => {
        window.location.href = 'language.html';
      }, 200);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
