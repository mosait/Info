<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="shared.css">
  <!-- Preload assets used in modals -->
  <link rel="preload" href="./assets/QR_Nikah.png" as="image">
  <link rel="preload" href="./assets/QR_Apple.png" as="image">
  <link rel="preload" href="./assets/QR_Android.png" as="image">
  <script>
    if (sessionStorage.getItem('fromPage')) {
      document.documentElement.classList.add('page-entering');
    }
  </script>
  <style>
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
      opacity: 1;
    }
    .modal-content {
      background: white; width: clamp(320px, 85vmin, 918px); border-radius: var(--radius);
      padding: clamp(24px, 3.5vmin, 68px); position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transform: scale(0.8) translateY(30px);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
    }
    .modal-overlay.show .modal-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }
    .modal-overlay.closing {
      opacity: 0;
    }
    .modal-overlay.closing .modal-content {
      transform: scale(0.9) translateY(20px);
      opacity: 0;
    }
    .qr-img { width: clamp(140px, 17vmin, 324px); display: block; margin: clamp(14px, 1.4vmin, 27px) auto clamp(3px, 0.35vmin, 7px) auto; border: 1px solid #eee; border-radius: clamp(10px, 1.1vmin, 22px); }
    .store-badge { width: clamp(120px, 14vmin, 270px); border-radius: clamp(9px, 1vmin, 19px); }
    
    /* Responsive modal text */
    .modal-text-sm { font-size: clamp(14px, 1.4vmin, 20px); }
    .modal-text-md { font-size: clamp(16px, 1.6vmin, 22px); }
    .modal-text-lg { font-size: clamp(20px, 2vmin, 32px); }
    .modal-phone { font-size: clamp(22px, 2.4vmin, 32px); color: var(--primary); }
    .modal-section { font-size: clamp(18px, 1.9vmin, 22px); color: var(--primary); }
    .modal-hint { font-size: clamp(13px, 1.3vmin, 18px); opacity: 0.8; }
    .modal-qr-label { margin-top: 2px; font-size: clamp(14px, 1.4vmin, 18px); opacity: 0.8; }
    .modal-store-label { margin-top: 4px; font-size: clamp(12px, 1.2vmin, 16px); opacity: 0.8; }
    .modal-warning { margin-top: 12px; background: #fff3cd; padding: 10px 16px; border-radius: 8px; font-size: clamp(14px, 1.5vmin, 20px); text-align: center; }
    .modal-box { padding: 16px 20px; border-radius: 12px; margin-bottom: 16px; }
    .modal-box-title { font-size: clamp(16px, 1.7vmin, 22px); color: var(--primary); }
    .modal-box-content { margin-top: 8px; font-size: clamp(14px, 1.5vmin, 18px); }
    
    @media screen and (max-width: 600px) {
      .modal-phone { font-size: 20px; }
      .modal-section { font-size: 16px; }
      .modal-hint { font-size: 12px; }
      .modal-qr-label { font-size: 13px; }
      .modal-store-label { font-size: 11px; }
      .modal-warning { font-size: 13px; padding: 8px 12px; }
      .modal-box { padding: 12px 16px; margin-bottom: 12px; }
      .modal-box-title { font-size: 15px; }
      .modal-box-content { font-size: 13px; }
      .qr-img { width: 140px !important; }
      .store-badge { width: 110px !important; }
    }
    
    /* Green overlay for screensaver transition */
    .green-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #1a5d48, #2d8a6c, #164e3c, #1a5d48);
      background-size: 400% 400%;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .green-overlay.active {
      opacity: 1;
      animation: gradientBG 15s ease infinite;
    }
    /* Dissolve effect for exit to screensaver */
    .green-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.1) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .green-overlay.active::after {
      opacity: 1;
    }
    /* Entry state: starts visible, will fade out with elegant reveal */
    .green-overlay.entry {
      opacity: 1;
      transition: none;
    }
    .green-overlay.entry.reveal {
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* White overlay for page-to-page transitions */
    html.page-entering .white-overlay {
      opacity: 1 !important;
      transition: none !important;
    }
    .white-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 199;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .white-overlay.active {
      opacity: 1;
    }
    .white-overlay.entry {
      opacity: 1;
      transition: none;
    }
    .white-overlay.entry.reveal {
      opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Content animation */
    .content-wrapper {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .content-wrapper.hidden {
      opacity: 0;
      transform: translateY(10px) scale(0.99);
      transition: opacity 0.25s ease-out, transform 0.25s ease-out;
    }
    
    /* Exit to screensaver - content dissolve */
    .content-wrapper.exiting .back-nav,
    .content-wrapper.exiting img,
    .content-wrapper.exiting .topic-card {
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      opacity: 0;
      transform: scale(0.97) translateY(-6px);
    }
    .content-wrapper.exiting .topic-card { transition-delay: 0s; }
    .content-wrapper.exiting img { transition-delay: 0.05s; }
    .content-wrapper.exiting .back-nav { transition-delay: 0.1s; }
  </style>
</head>
<body>
  <div class="green-overlay" id="greenOverlay"></div>
  <div class="white-overlay" id="whiteOverlay"></div>
  <div class="container content-wrapper" id="content" style="padding: clamp(20px, 2.1vmin, 40px) clamp(35px, 3.5vmin, 68px);">

      <a href="language.html" class="back-nav" onclick="navigateTo(event, this.href)">← Zurück / Back</a>
      <img src="./assets/IZS_Logo_Black.png" alt="Logo" style="height: clamp(55px, 5.5vmin, 108px);">
    </div>

    <div id="grid" class="topics-grid"></div>
  </div>

  <div id="modal" class="modal-overlay" onclick="closeModal()">

      <div id="mBody" style="font-size: clamp(18px, 1.8vmin, 35px); line-height: 1.6; margin-top: clamp(16px, 1.7vmin, 34px);"></div>
      <button onclick="closeModal()" 
              style="margin-top: clamp(26px, 2.7vmin, 54px); width: 100%; padding: clamp(14px, 1.4vmin, 27px); border-radius: clamp(10px, 1vmin, 20px); border: none; background: var(--primary); color: white; font-size: clamp(15px, 1.5vmin, 30px); font-weight: 700;">
        Schließen / Close
      </button>
    </div>
  </div>

  <script>
    // Smooth page navigation (back to language - use white overlay)
    function navigateTo(event, url) {
      event.preventDefault();
      const whiteOverlay = document.getElementById('whiteOverlay');
      sessionStorage.setItem('fromPage', 'true');
      
      whiteOverlay.classList.remove('entry', 'reveal');
      whiteOverlay.classList.add('active');
      
      setTimeout(() => {
        window.location.href = url;
      }, 300);
    }

    // Check if coming from language page (use white reveal)
    const overlay = document.getElementById('greenOverlay');
    const whiteOverlay = document.getElementById('whiteOverlay');
    const content = document.getElementById('content');
    
    if (sessionStorage.getItem('fromPage')) {
      document.documentElement.classList.remove('page-entering');
      whiteOverlay.classList.add('entry');
      sessionStorage.removeItem('fromPage');
      
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          whiteOverlay.classList.add('reveal');
        });
      });
    }

    // Modal functions
    function openModal() {
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';
      // Trigger reflow for animation
      modal.offsetHeight;
      modal.classList.add('show');
      modal.classList.remove('closing');
    }
    
    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('closing');
      modal.classList.remove('show');
      setTimeout(() => {
        modal.style.display = 'none';
        modal.classList.remove('closing');
      }, 300);
    }

    if(lang === 'ar') {

    }

    const grid = document.getElementById('grid');
    topics.forEach(t => {
      const btn = document.createElement('div');
      btn.className = 'topic-card';
      btn.innerHTML = `<span class="icon">${t.icon}</span><span class="label">${lang === 'ar' ? t.arTitle : t.deTitle}</span>`;

        // Use innerHTML so any HTML (e.g. <br>) in the title is rendered
        document.getElementById('mTitle').innerHTML = lang === 'ar' ? t.arTitle : t.deTitle;
        document.getElementById('mBody').innerHTML = lang === 'ar' ? t.arInfo : t.deInfo;

      };
      grid.appendChild(btn);

      backButton.textContent = 'العودة ←';
      closeButton.textContent = 'إغلاق';
      document.body.classList.add('rtl');

      closeButton.textContent = 'Schließen';
      document.body.classList.remove('rtl');

    // Fade to green for screensaver
    function fadeToGreen() {
      const overlay = document.getElementById('greenOverlay');
      const content = document.getElementById('content');
      // Mark that we're coming from timeout
      sessionStorage.setItem('fromTimeout', 'true');
      
      // Start content exit animation first
      content.classList.add('exiting');
      
      // Then fade in green overlay
      setTimeout(() => {
        overlay.classList.remove('entry', 'reveal');
        overlay.classList.add('active');
      }, 100);
      
      // Navigate when fully covered
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 400);
    }

    let idle;
    const resetTimer = () => { 
      clearTimeout(idle); 
      idle = setTimeout(() => {
        fadeToGreen();
      }, 60000); 
    };
    window.onclick = resetTimer;
    resetTimer();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
